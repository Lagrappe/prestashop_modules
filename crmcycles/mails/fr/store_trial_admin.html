<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nouvelle demande d'essai en magasin</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333; line-height: 1.6; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #e67e22;">Nouvelle demande d'essai en magasin</h2>

  <p>Un client souhaite essayer un produit en magasin :</p>

  <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold; background: #f5f5f5;">Nom</td>
      <td style="padding: 8px; border: 1px solid #ddd;">{lastname} {firstname}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold; background: #f5f5f5;">Email</td>
      <td style="padding: 8px; border: 1px solid #ddd;">{email}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold; background: #f5f5f5;">Téléphone</td>
      <td style="padding: 8px; border: 1px solid #ddd;">{phone}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold; background: #f5f5f5;">Produit</td>
      <td style="padding: 8px; border: 1px solid #ddd;">{product_name}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold; background: #f5f5f5;">Date souhaitée</td>
      <td style="padding: 8px; border: 1px solid #ddd;">{desired_date}</td>
    </tr>
  </table>

  <p>Pensez à recontacter le client pour confirmer le rendez-vous.</p>
</body>
</html>
