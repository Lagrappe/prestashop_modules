<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Demande d'essai en magasin</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333; line-height: 1.6; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #2fb5d2;">Demande d'essai en magasin</h2>

  <p>Bonjour {firstname} {lastname},</p>

  <p>Nous avons bien reçu votre demande d'essai en magasin pour le produit suivant :</p>

  <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold; background: #f5f5f5;">Produit</td>
      <td style="padding: 8px; border: 1px solid #ddd;">{product_name}</td>
    </tr>
    <tr>
      <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold; background: #f5f5f5;">Date souhaitée</td>
      <td style="padding: 8px; border: 1px solid #ddd;">{desired_date}</td>
    </tr>
  </table>

  <p>Nous vous recontacterons prochainement pour confirmer votre rendez-vous.</p>

  <p>À très bientôt,<br>{shop_name}</p>
</body>
</html>
